<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSFM to FARC Tool</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
  <div class="container py-5">
    <div class="card shadow-sm mx-auto" style="max-width:600px">
      <div class="card-body p-4">
        <h1 class="h4 mb-1 fw-bold">CSFM to FARC Compiler</h1>
        <p class="text-muted small mb-4">Generate a .farc sprite file for Project DIVA.</p>
        <form action="/compile" method="POST" enctype="multipart/form-data">
          <div class="mb-3">
            <label class="form-label fw-semibold">PV ID *</label>
            <input type="number" name="pv_id" class="form-control" value="100" min="0" max="9999" required/>
            <div class="form-text">e.g. 100 → spr_sel_pv100.farc</div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Output Filename</label>
            <div class="input-group">
              <input type="text" name="output_name" class="form-control" placeholder="Leave blank for default"/>
              <span class="input-group-text">.farc</span>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Compression</label>
            <select name="compression" class="form-select">
              <option value="ATI2" selected>YCbCr / BC5 (ATI2) — Recommended</option>
              <option value="BC7">BC7</option>
              <option value="DXT5">DXT5 / BC3</option>
              <option value="RGBA">Uncompressed RGBA</option>
            </select>
          </div>
          <hr/>
          <div class="mb-3">
            <label class="form-label fw-semibold">Background Image (SONG_BG) *</label>
            <input type="file" name="bg_path" class="form-control" accept="image/*" required/>
            <div class="form-text">Cropped to 1280x720.</div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Jacket Image (SONG_JK)</label>
            <input type="file" name="jk_path" class="form-control" accept="image/*"/>
            <div class="form-text">Cropped to 502x502. Optional.</div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Logo Image (SONG_LOGO)</label>
            <input type="file" name="logo_path" class="form-control" accept="image/*"/>
            <div class="form-text">Padded to 870x330. Optional.</div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
            Compile &amp; Download .farc
          </button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
